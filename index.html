<!DOCTYPE html>
<html>
<head>
  <title>Dog da Praça</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h2>Dog da Praça</h2>
</header>

<main id="menu"></main>

<!-- CARRINHO -->
<div id="cart">
  <span id="cartInfo">0 itens</span>
  <button onclick="abrirCheckout()">Finalizar</button>
</div>

<!-- CHECKOUT -->
<div id="checkout" style="display:none; padding:10px; background:white; position:fixed; top:0; left:0; right:0;">
  <h3>Finalizar Pedido</h3>

  <input id="nome" placeholder="Nome"><br><br>
  <input id="endereco" placeholder="Endereço"><br><br>
  <input id="telefone" placeholder="Telefone"><br><br>

  <select id="pagamento">
    <option value="">Pagamento</option>
    <option value="Pix">Pix</option>
    <option value="Crédito">Crédito</option>
    <option value="Débito">Débito</option>
    <option value="Dinheiro">Dinheiro</option>
  </select><br><br>

  <textarea id="obs" placeholder="Observações"></textarea><br><br>

  <button onclick="enviar()">Enviar Pedido</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
