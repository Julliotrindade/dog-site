<!DOCTYPE html>
<html>
<head>
  <title>Dog da Praça</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Dog da Praça</header>

<main id="menu"></main>

<!-- BOTÃO CARRINHO -->
<div id="cart">
  <span id="cartInfo">0 itens</span>
  <button onclick="abrirCarrinho()">Ver Carrinho</button>
</div>

<!-- OVERLAY -->
<div id="overlay"></div>

<!-- MODAL PRODUTO -->
<div id="modalProduto">

  <img id="modalImg">

  <h2 id="modalNome"></h2>
  <p id="modalDesc"></p>
  <strong id="modalPreco"></strong>

  <div>
    <button onclick="diminuirQtd()">-</button>
    <span id="modalQtd">1</span>
    <button onclick="aumentarQtd()">+</button>
  </div>

  <input id="modalObs" placeholder="Observação">

  <button onclick="confirmarAdd()">Adicionar</button>
  <button onclick="fecharModal()">Cancelar</button>

</div>

<!-- CARRINHO -->
<div id="carrinhoModal" style="display:none;">

  <h2>Seu Carrinho</h2>

  <div id="listaCarrinho"></div>

  <button onclick="limparCarrinho()">Esvaziar Carrinho</button>

  <hr>

  <h3>Finalizar Pedido</h3>

  <input id="nome" placeholder="Nome">
  <input id="endereco" placeholder="Endereço">
  <input id="telefone" placeholder="Telefone">

  <select id="pagamento">
    <option value="">Pagamento</option>
    <option value="Pix">Pix</option>
    <option value="Dinheiro">Dinheiro</option>
  </select>

  <button onclick="enviar()">Enviar Pedido</button>
  <button onclick="fecharCarrinho()">Fechar</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
