<div id="overlay"></div>

<div id="modalProduto">

  <!-- IMAGEM GRANDE -->
  <img id="modalImg" class="modal-img">

  <div class="modal-content">
    <h2 id="modalNome"></h2>
    <p id="modalDesc" class="modal-desc"></p>
    <strong id="modalPreco"></strong>

    <!-- QTD -->
    <div class="qtd-box">
      <button onclick="diminuirQtd()">-</button>
      <span id="modalQtd">1</span>
      <button onclick="aumentarQtd()">+</button>
    </div>

    <!-- OBS -->
    <input id="modalObs" placeholder="Alguma observação?">

    <!-- BOTÕES -->
    <button class="btn-add-main" onclick="confirmarAdd()">
      Adicionar ao carrinho
    </button>

    <button class="btn-cancel" onclick="fecharModal()">
      Cancelar
    </button>

  </div>

</div>
