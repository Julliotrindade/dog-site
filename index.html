<!DOCTYPE html>
<html>
<head>
  <title>Dog da Praça</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Dog da Praça</header>

<main id="menu"></main>

<!-- BOTÃO CARRINHO -->
<div id="cart">
  <span id="cartInfo">0 itens</span>
  <button class="btn-primary" onclick="abrirCarrinho()">Ver Carrinho</button>
</div>

<!-- MODAL PRODUTO -->
<div id="modalProduto">

  <img id="modalImg">

  <div class="modal-content">
    <h2 id="modalNome"></h2>
    <p id="modalDesc"></p>
    <strong id="modalPreco"></strong>

    <div class="qtd-box">
      <button onclick="diminuirQtd()">-</button>
      <span id="modalQtd">1</span>
      <button onclick="aumentarQtd()">+</button>
    </div>

    <input id="modalObs" placeholder="Observação">

    <button class="btn-primary" onclick="confirmarAdd()">Adicionar</button>
    <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
  </div>

</div>

<!-- MODAL CARRINHO -->
<div id="carrinhoModal">

  <h2>Seu Carrinho</h2>

  <div id="listaCarrinho"></div>

  <button class="btn-danger" onclick="limparCarrinho()">Esvaziar Carrinho</button>

  <hr>

  <h3>Finalizar Pedido</h3>

  <input id="nome" placeholder="Nome">
  <input id="endereco" placeholder="Endereço">
  <input id="telefone" placeholder="Telefone">

  <select id="pagamento">
    <option value="">Pagamento</option>
    <option value="Pix">Pix</option>
    <option value="Dinheiro">Dinheiro</option>
  </select>

  <button class="btn-primary" onclick="enviar()">Enviar Pedido</button>
  <button class="btn-secondary" onclick="fecharCarrinho()">Fechar</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
